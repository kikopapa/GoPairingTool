<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>圍棋班對戰抽籤系統 - 小樹爸爸 KIKOPAPA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root{ --primary: #4a6741; --bg: #b9c8b1; --card: rgba(255,255,255,0.95); --accent: #e67e22; --download: #2980b9; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 15px; flex: 1; width: 100%; }
    
    header { text-align: center; margin-bottom: 25px; }
    h1 { color: #2c3e50; font-size: clamp(24px, 5vw, 36px); margin-bottom: 5px; }
    .brand-sub { color: #4a6741; font-weight: bold; font-size: clamp(14px, 2.5vw, 18px); margin-bottom: 15px; }

    .panel { background: var(--card); padding: clamp(15px, 4vw, 25px); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }
    h3 { font-size: clamp(18px, 3vw, 24px); margin-top: 0; color: #333; }

    /* 1. 班級選擇按鈕優化 */
    .filter-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 15px; }
    .class-btn { 
      padding: 10px 20px; 
      border-radius: 25px; 
      border: 2px solid var(--primary); 
      background: transparent; 
      color: var(--primary); 
      cursor: pointer; 
      font-weight: bold; 
      font-size: clamp(15px, 2.2vw, 19px); /* 響應式字體 */
      transition: 0.3s; 
    }
    .class-btn.active { background: var(--primary); color: white; }
    
    /* 2. 學生點名按鈕優ize */
    .student-pool { display: flex; flex-wrap: wrap; gap: 10px; min-height: 50px; }
    .student-btn { 
      padding: clamp(10px, 2vw, 15px) clamp(15px, 3vw, 22px); 
      border-radius: 12px; 
      border: 1px solid #ccc; 
      background: #fff; 
      cursor: pointer; 
      font-size: clamp(15px, 2.2vw, 20px); /* 解決平板字體太小關鍵 */
      transition: 0.2s; 
      -webkit-tap-highlight-color: transparent; 
    }
    .student-btn.selected { background: #ffd700; border-color: #f39c12; font-weight: bold; transform: scale(1.03); }
    
    /* 3. 臨時插班區塊優化 */
    .temp-add-zone { 
      margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; 
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; 
      font-size: clamp(15px, 2.2vw, 19px);
    }
    .temp-input { 
      padding: 12px; border-radius: 8px; border: 1px solid #ccc; flex: 1; min-width: 150px; 
      font-size: clamp(15px, 2.2vw, 19px); 
    }
    .btn-add { 
      background: var(--accent); color: white; border: none; 
      padding: 12px 25px; border-radius: 8px; cursor: pointer; 
      font-weight: bold; font-size: clamp(15px, 2.2vw, 19px); 
    }

    .controls { display: flex; gap: 15px; margin-top: 25px; }
    .btn-main { 
      background: var(--primary); color: white; border: none; 
      padding: 18px 20px; border-radius: 12px; cursor: pointer; flex: 1; 
      font-size: clamp(16px, 2.5vw, 22px); font-weight: bold; 
    }
    
    /* 棋盤匯出區 */
    #exportArea { 
      background-color: #e3a857;
      background-image: linear-gradient(90deg, rgba(0,0,0,0.15) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
      background-size: 30px 30px;
      padding: 30px; border-radius: 4px; border: 8px solid #c88d3a;
    }
    .result-box-inner { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 10px; }
    .result-header { text-align: center; border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
    
    .result-item { 
      display: flex; align-items: center; justify-content: space-between; 
      background: white; padding: 12px 10px; margin: 10px 0; border-radius: 8px; 
    }
/* 修正後的比例：給名字更多空間 */
    .col-group { width: 18%; text-align: left; color: #7f8c8d; font-size: 14px; font-weight: bold; white-space: nowrap; }
    .col-player-left { width: 35%; text-align: right; font-weight: bold; padding-right: 8px; font-size: clamp(16px, 2.5vw, 20px); }
    .col-vs { width: 12%; color: var(--accent); font-size: 14px; font-weight: bold; text-align: center; }
    .col-player-right { width: 35%; text-align: left; font-weight: bold; padding-left: 8px; font-size: clamp(16px, 2.5vw, 20px); }
    
    .rank-tag { font-weight: normal; font-size: 13px; color: #666; }
    .img-watermark { text-align: right; font-size: 12px; color: #8a6d3b; margin-top: 15px; font-family: serif; font-style: italic; }

    .btn-download { background: var(--download); color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; display: none; font-size: 18px; }

    /* 品牌頁尾 */
    footer { background: #2c3e50; color: #ecf0f1; padding: 40px 20px; text-align: center; line-height: 1.8; margin-top: auto; font-size: 16px; }
    footer a { color: #3498db; text-decoration: none; border-bottom: 1px solid #3498db; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>圍棋班對戰抽籤系統 🎲</h1>
    <div class="brand-sub">💡 步驟：1.選班級 -> 2.點選出席學生 -> 3.按下配對</div>
  </header>

  <div class="panel">
    <h3>1. 選擇班級</h3>
    <div id="classFilter" class="filter-group"></div>

    <h3>2. 今日出席點名 (已選: <span id="count">0</span> 人)</h3>
    <div id="studentList" class="student-pool">
      <p style="color: #666;">請先選擇上方班級</p>
    </div>

    <div class="temp-add-zone">
      <span>➕ 臨時插班：</span>
      <input type="text" id="tempName" class="temp-input" placeholder="學生姓名">
      <input type="number" id="tempLevel" class="temp-input" style="max-width: 80px;" placeholder="級數" value="30">
      <button class="btn-add" onclick="addTempStudent()">加入配對池</button>
    </div>

    <div class="controls">
      <button class="btn-main" onclick="draw('rank')">棋力接近配對</button>
      <button class="btn-main" style="background: #555;" onclick="draw('random')">完全隨機配對</button>
    </div>
  </div>

  <div class="panel">
    <h3>抽籤結果</h3>
    <div id="exportArea">
        <div id="resultContent" class="result-box-inner">
            <p style="color:#666; text-align:center;">尚未產生結果</p>
        </div>
        <div class="img-watermark" id="imgWatermark" style="display:none;">Generated by www.kikopapa.com</div>
    </div>
    <button id="downloadBtn" class="btn-download" onclick="exportAsImage()">📥 下載對戰表圖檔 (可分享至家長群組)</button>
  </div>
</div>

<footer>
  <div>作者：小樹爸爸 (KIKOPAPA)</div>
  <div>致力於推廣圍棋教育與數位學習紀錄</div>
  <div>更多分享：<a href="https://www.kikopapa.com" target="_blank">www.kikopapa.com</a></div>
  <div class="footer-copyright">© 2026 KIKOPAPA.COM 版權所有</div>
</footer>

<script>
  const rawData = [
    { id: 1, name: "淳量", level: 23, className: "週三班 (晚上7點)" },
    { id: 2, name: "智堯", level: 25, className: "週三班 (晚上7點)" },
    { id: 3, name: "譯霆", level: 27, className: "週三班 (晚上7點)" },
    { id: 4, name: "永詺", level: 26, className: "週三班 (晚上7點)" },
    { id: 5, name: "証淞", level: 27, className: "週三班 (晚上7點)" },
    { id: 6, name: "康衡", level: 26, className: "週三班 (晚上7點)" },
    { id: 7, name: "寬儒", level: 26, className: "週三班 (晚上7點)" },
    { id: 8, name: "卓運", level: 27, className: "週三班 (晚上7點)" },
    { id: 9, name: "翔翼", level: 20, className: "週六班 (下午3點)" },
    { id: 10, name: "科羽", level: 23, className: "週六班 (下午3點)" },
    { id: 11, name: "佑承", level: 23, className: "週六班 (下午3點)" },
    { id: 12, name: "宸聿", level: 23, className: "週六班 (下午3點)" },
    { id: 13, name: "黎享", level: 28, className: "週六班 (下午3點)" },
    { id: 14, name: "首言", level: 27, className: "週六班 (下午3點)" },
    { id: 15, name: "沐華", level: 24, className: "週六班 (下午3點)" },
    { id: 16, name: "佑竹", level: 28, className: "週六班 (下午5點)" },
    { id: 17, name: "薰尹", level: 26, className: "週六班 (下午5點)" },
    { id: 18, name: "佑承_5點", level: 25, className: "週六班 (下午5點)" }, 
    { id: 19, name: "沛奇", level: 26, className: "週六班 (下午5點)" },
    { id: 20, name: "允恩", level: 25, className: "週六班 (下午5點)" },
    { id: 21, name: "德宇", level: 30, className: "週五班 (晚上7點)" },
    { id: 22, name: "宥勳", level: 30, className: "週五班 (晚上7點)" },
    { id: 23, name: "芸榆", level: 30, className: "週五班 (晚上7點)" }
  ];

  let tempStudents = [];
  let currentClass = "";
  let selectedStudentIds = new Set();

  function init() {
    const classes = [...new Set(rawData.map(s => s.className))];
    const filterEl = document.getElementById('classFilter');
    classes.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'class-btn';
      btn.innerText = c;
      btn.onclick = () => selectClass(c, btn);
      filterEl.appendChild(btn);
    });
  }

  function selectClass(className, btn) {
    currentClass = className;
    document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStudents();
  }

  function addTempStudent() {
    const n = document.getElementById('tempName'), l = document.getElementById('tempLevel');
    const name = n.value.trim(), level = parseInt(l.value);
    if (!name || !currentClass) return alert("請先選擇一個班級並輸入姓名");
    const newS = { id: "temp_" + Date.now(), name, level: level || 30, className: currentClass };
    tempStudents.push(newS);
    selectedStudentIds.add(newS.id);
    n.value = ""; renderStudents(); updateCount();
  }

  function renderStudents() {
    const listEl = document.getElementById('studentList');
    listEl.innerHTML = '';
    const combinedData = [...rawData, ...tempStudents];
    const filtered = combinedData.filter(s => s.className === currentClass);
    filtered.forEach(s => {
      const btn = document.createElement('button');
      btn.className = `student-btn ${selectedStudentIds.has(s.id) ? 'selected' : ''}`;
      btn.innerText = `${s.name.replace(/_.*$/, '')} (${s.level}級)`;
      btn.onclick = () => {
        if (selectedStudentIds.has(s.id)) selectedStudentIds.delete(s.id);
        else selectedStudentIds.add(s.id);
        renderStudents(); updateCount();
      };
      listEl.appendChild(btn);
    });
  }

  function updateCount() { document.getElementById('count').innerText = selectedStudentIds.size; }

  function draw(type) {
    const combinedData = [...rawData, ...tempStudents];
    let players = combinedData.filter(s => selectedStudentIds.has(s.id));
    if (players.length < 2) return alert("請至少選取兩位學生");

    if (type === 'rank') players.sort((a, b) => a.level - b.level);
    else players.sort(() => Math.random() - 0.5);

    const today = new Date().toLocaleDateString();
    let html = `<div class="result-header">
                  <h2 style="margin:0; color:#2c3e50;">圍棋班對局表</h2>
                  <div style="color:#555; margin-top:5px;">${currentClass} | ${today}</div>
                </div>`;
                
    for (let i = 0; i < players.length; i += 2) {
      const p1 = players[i], p2 = players[i+1];
      const n1 = p1.name.replace(/_.*$/, ''), n2 = p2 ? p2.name.replace(/_.*$/, '') : null;
      const groupNum = Math.floor(i/2) + 1;

      // ✨ 使用百分比佈局的 Flex 結構，徹底解決圖片排版崩壞
      html += `
        <div class="result-item">
          <div class="col-group">第 ${groupNum} 組</div>
          <div class="col-player-left">${n1} <span class="rank-tag">(${p1.level}級)</span></div>
          <div class="col-vs">VS</div>
          <div class="col-player-right">
            ${p2 ? `${n2} <span class="rank-tag">(${p2.level}級)</span>` : '<b style="color:#e74c3c;">【輪空】</b>'}
          </div>
        </div>`;
    }
    
    document.getElementById('resultContent').innerHTML = html;
    document.getElementById('imgWatermark').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'block';
  }

  function exportAsImage() {
    const btn = document.getElementById('downloadBtn');
    btn.innerText = "⏳ 正在生成品牌對戰表...";
    html2canvas(document.getElementById('exportArea'), {
        scale: 2,
        useCORS: true,
        backgroundColor: null // 保持 CSS 定義的背景
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `KIKOPAPA_對戰表_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        btn.innerText = "📥 下載對戰表圖檔 (可分享至家長群組)";
    });
  }

  init();
</script>

</body>

</html>
